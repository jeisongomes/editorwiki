<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editor Wiki Visual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { background: #f5f5f5; padding: 8px; border-bottom: 1px solid #ccc; }
    .toolbar button { margin-right: 4px; padding: 4px 8px; cursor: pointer; }
    .container { display: flex; flex: 1; overflow: hidden; }
    .editor-pane, .preview-pane { flex: 1; overflow: auto; padding: 16px; }
    .editor-pane { border-right: 1px solid #ccc; }
    #code-editor { width: 100%; height: 100%; font-family: monospace; font-size: 14px; border: none; resize: none; outline: none; }
    .preview-pane { background: #fff; }
    /* Estilos wiki básicos */
    .preview-pane h1 { border-bottom: 1px solid #a2a9b1; font-size: 1.8em; margin-bottom: 0.5em; }
    .preview-pane h2 { border-bottom: 1px solid #a2a9b1; font-size: 1.5em; margin: 1em 0 0.5em; }
    .preview-pane h3 { font-size: 1.2em; margin: 1em 0 0.5em; }
    .preview-pane a { color: #0645ad; }
    .preview-pane a.new { color: #ba0000; }
    .preview-pane ul, .preview-pane ol { margin-left: 1.5em; }
    .preview-pane code { background: #f8f9fa; padding: 2px 4px; }
    .preview-pane pre { background: #f8f9fa; padding: 12px; overflow-x: auto; }
    .preview-pane blockquote { border-left: 3px solid #c8ccd1; margin: 1em 0; padding-left: 1em; color: #54595d; }
    .preview-pane table { border-collapse: collapse; margin: 1em 0; }
    .preview-pane th, .preview-pane td { border: 1px solid #a2a9b1; padding: 6px 12px; }
    .preview-pane th { background: #eaecf0; }
    .infobox { float: right; width: 260px; margin: 0 0 1em 1em; border: 1px solid #a2a9b1; background: #f8f9fa; padding: 8px; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="insertTag('\'\'\'', '\'\'\'')"><b>B</b></button>
    <button onclick="insertTag('\'\'', '\'\'')"><i>I</i></button>
    <button onclick="insertTag('[[', ']]')">Link</button>
    <button onclick="insertTag('== ', ' ==')">H2</button>
    <button onclick="insertTag('=== ', ' ===')">H3</button>
    <button onclick="insertTag('* ', '')">• Lista</button>
    <button onclick="insertTag('# ', '')">1. Lista</button>
    <button onclick="insertTag('<ref>', '</ref>')">Ref</button>
  </div>
  <div class="container">
    <div class="editor-pane">
      <textarea id="code-editor" placeholder="Cole seu código wiki aqui..."></textarea>
    </div>
    <div class="preview-pane" id="preview"></div>
  </div>

  <script src="[unpkg.com](https://unpkg.com/wtf_wikipedia@latest/builds/wtf_wikipedia.min.js)"></script>
  <script>
    const editor = document.getElementById('code-editor');
    const preview = document.getElementById('preview');
    let timeout;

    // Parser de wikitext para HTML
    function parseWikitext(wikitext) {
      try {
        const doc = wtf(wikitext);
        let html = doc.html() || '';
        
        // Ajustes adicionais que o wtf_wikipedia não cobre bem
        html = postProcess(html, wikitext);
        return html;
      } catch (e) {
        return `<p style="color: red;">Erro no parsing: ${e.message}</p>`;
      }
    }

    function postProcess(html, original) {
      // Adiciona classes para links inexistentes (simulação)
      // Em produção, você verificaria via API quais páginas existem
      
      // Processa templates não reconhecidos como placeholders
      html = html.replace(/\{\{([^}]+)\}\}/g, '<span style="background:#ffe0e0;padding:2px 4px;border-radius:3px;">{{$1}}</span>');
      
      return html;
    }

    // Atualiza preview com debounce
    function updatePreview() {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        const wikitext = editor.value;
        preview.innerHTML = parseWikitext(wikitext);
      }, 300);
    }

    // Insere tags ao redor da seleção
    function insertTag(before, after) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const text = editor.value;
      const selected = text.substring(start, end);
      
      editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
      editor.focus();
      editor.setSelectionRange(start + before.length, end + before.length);
      updatePreview();
    }

    editor.addEventListener('input', updatePreview);

    // Exemplo inicial
    editor.value = `= Título do Artigo =

'''Texto em negrito''' e ''texto em itálico''.

== Seção ==

Um [[link interno]] e um [[exemplo.com](https://exemplo.com) link externo].

* Item 1
* Item 2
* Item 3

{| class="wikitable"
|-
! Cabeçalho 1 !! Cabeçalho 2
|-
| Célula 1 || Célula 2
|-
| Célula 3 || Célula 4
|}

=== Subseção ===

<blockquote>Uma citação em bloco.</blockquote>

<ref>Referência de exemplo</ref>

[[Categoria:Exemplo]]`;

    updatePreview();
  </script>
</body>
</html>
